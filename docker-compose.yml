version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      LLM_ENABLED: ${LLM_ENABLED:-true}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_CHAT_PATH: ${LLM_CHAT_PATH:-/chat/completions}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      API_PROXY_PASS: http://backend:8080
    depends_on:
      - backend
    ports:
      - "4200:80"
