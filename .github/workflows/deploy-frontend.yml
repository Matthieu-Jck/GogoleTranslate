name: Deploy frontend to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend before deploy
        run: |
          npm ci
          npm run build

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy frontend to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_KEY_FRONTEND != '' && secrets.FLY_API_KEY_FRONTEND || secrets.FLY_API_TOKEN_FRONTEND != '' && secrets.FLY_API_TOKEN_FRONTEND || secrets.FLY_API_TOKEN }}
