name: Deploy backend to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
      - ".github/workflows/ci.yml"
      - ".env.example"
      - "docker-compose.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify backend before deploy
        run: mvn -B test

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync backend secrets
        run: flyctl secrets set GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKEND != '' && secrets.FLY_API_TOKEN_BACKEND || secrets.FLY_API_TOKEN }}

      - name: Deploy backend to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKEND != '' && secrets.FLY_API_TOKEN_BACKEND || secrets.FLY_API_TOKEN }}
