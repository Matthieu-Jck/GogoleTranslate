spring:
  application:
    name: style-translator-api

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
    chat-path: ${LLM_CHAT_PATH:/chat/completions}
    api-key: ${LLM_API_KEY:${GROQ_API_KEY:}}
    model: ${LLM_MODEL:llama-3.3-70b-versatile}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
