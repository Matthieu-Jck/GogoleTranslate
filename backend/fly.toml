app = "gogoletranslate-api"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "8080"
  JAVA_TOOL_OPTIONS = "-Xms64m -Xmx128m -XX:ReservedCodeCacheSize=48m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError"
  LLM_ENABLED = "true"
  LLM_BASE_URL = "https://api.groq.com/openai/v1"
  LLM_CHAT_PATH = "/chat/completions"
  LLM_MODEL = "llama-3.3-70b-versatile"
  APP_CORS_ALLOWED_ORIGINS = "http://localhost:4200,http://127.0.0.1:4200,https://gogoletranslate-web.fly.dev"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    method = "get"
    path = "/api/v1/health"
    protocol = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
