app = "gogoletranslate-web"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  API_PROXY_PASS = "https://gogoletranslate-api.fly.dev"

[[services]]
  internal_port = 80
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
